<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Words Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滾動，確保固定比例 */
        }
        .page {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }
        .active {
            display: flex;
        }
        
        /* ---------------- Page 1: 首頁 ---------------- */
        #page1 {
            background-color: #FFB6C1; /* 淺粉紅色 */
        }
        .p1-row1 {
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: black;
        }
        .p1-row2 {
            height: 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            color: black;
            text-align: center;
        }
        .p1-row3 {
            height: 50%;
            padding: 10px 20px;
        }
        .p1-row3 textarea {
            width: 100%;
            height: 100%;
            padding: 10px;
            font-size: 1.2rem;
            resize: none;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .p1-row4 {
            height: 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            gap: 15px;
        }
        .p1-row5 {
            height: 15%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: white;
            border: 2px solid black;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ---------------- Page 2: 測驗頁 ---------------- */
        #page2 {
            background-color: white;
        }
        .p2-row1 {
            height: 30%;
            background-color: #FFB6C1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: black;
        }
        .p2-row2 {
            height: 10%;
            background-color: #FFB6C1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: black;
            position: relative;
            border-top: 1px dashed #fff;
        }
        .speaker-btn {
            position: absolute;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .p2-row3 {
            height: 40%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
        }
        .char-card {
            background-color: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .char-card:active {
            background-color: #e0e0e0;
        }
        .p2-row4 {
            height: 10%;
            display: flex;
            padding: 10px;
            gap: 10px;
        }
        .btn-clear {
            flex: 1;
            background-color: darkblue;
            color: white;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-submit {
            flex: 1;
            background-color: red;
            color: white;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* ---------------- Page 3: 結果頁 ---------------- */
        #page3 {
            background-color: white;
        }
        .p3-top {
            height: 20%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid #eee;
        }
        .p3-top h1 {
            color: black;
            font-size: 1.8rem;
        }
        .btn-home {
            background-color: #FFB6C1;
            color: black;
            border: 1px solid black;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .p3-bottom {
            height: 80%;
            overflow-y: auto;
            padding: 10px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        .result-table th, .result-table td {
            border: 1px solid #ccc;
            padding: 10px 5px;
        }
        .result-table th {
            background-color: #f9f9f9;
        }

        /* ---------------- 彈出視窗 (Modal) ---------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        .modal-msg {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .modal-btn {
            padding: 10px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }
        .btn-correct { background-color: #4CAF50; }
        .btn-wrong { background-color: #f44336; }
        
        /* 載入中遮罩 */
        #loading {
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <div class="p1-row1">Words Test</div>
        <div class="p1-row2">請輸入欲測驗的英文單字，每一個單字需換行區分。</div>
        <div class="p1-row3">
            <textarea id="wordInput" placeholder="apple&#10;banana&#10;orange"></textarea>
        </div>
        <div class="p1-row4">
            <label><input type="radio" name="mode" value="random" checked> 隨機填空</label>
            <label><input type="radio" name="mode" value="vowel"> 母音填空</label>
        </div>
        <div class="p1-row5">
            <button class="btn-start" onclick="startTest()">開始測驗</button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="p2-row1" id="testWordDisplay">_ _ _ _ _</div>
        <div class="p2-row2">
            <span id="testTranslationDisplay">中文翻譯</span>
            <button class="speaker-btn" onclick="playAudio()">🔊</button>
        </div>
        <div class="p2-row3" id="cardContainer">
            </div>
        <div class="p2-row4">
            <button class="btn-clear" onclick="clearLastInput()">清除</button>
            <button class="btn-submit" onclick="checkAnswer()">作答</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="p3-top">
            <h1>測驗結果</h1>
            <button class="btn-home" onclick="goHome()">回到首頁</button>
        </div>
        <div class="p3-bottom">
            <table class="result-table">
                <thead>
                    <tr>
                        <th>順序</th>
                        <th>結果</th>
                        <th>單字</th>
                        <th>中文翻譯</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalMsg" class="modal-msg">訊息</div>
            <button id="modalBtn" class="modal-btn" onclick="handleModalAction()">按鈕</button>
        </div>
    </div>

    <div id="loadingOverlay" class="modal-overlay">
        <div id="loading">載入翻譯中，請稍候...</div>
    </div>

    <script>
        // 全域變數
        let wordsData = [];
        let test_words_total_num = 0;
        let currentIndex = 0;
        let currentMode = '';
        
        // 當前單字狀態
        let currentMissingIndices = []; // 紀錄哪些位置被挖空
        let currentUserInputs = [];     // 紀錄使用者依序填入的字母
        let currentCorrectAnswers = []; // 正確填空字母陣列
        let modalActionType = '';       // 'next', 'finish', 'retry'

        // 基本字典 (避免外部 API 失敗的後備方案)
        const fallbackDict = {
            "apple": "蘋果", "banana": "香蕉", "cat": "貓", "dog": "狗", "book": "書"
        };

        // 切換頁面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 呼叫免費 API 取得翻譯 (模擬等待)
        async function fetchTranslation(word) {
            let cleanWord = word.trim().toLowerCase();
            if (fallbackDict[cleanWord]) return fallbackDict[cleanWord];
            try {
                // 使用免費 MyMemory API
                let res = await fetch(`https://api.mymemory.translated.net/get?q=${cleanWord}&langpair=en|zh-TW`);
                let data = await res.json();
                if(data.responseData.translatedText) {
                    return data.responseData.translatedText;
                }
            } catch (e) {
                console.warn("Translation API failed for:", word);
            }
            return "查無翻譯"; 
        }

        // 開始測驗
        async function startTest() {
            const rawText = document.getElementById('wordInput').value;
            const lines = rawText.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            
            if (lines.length === 0) {
                alert("請至少輸入一個單字！");
                return;
            }

            test_words_total_num = lines.length;
            currentMode = document.querySelector('input[name="mode"]:checked').value;
            wordsData = [];
            currentIndex = 0;

            // 顯示載入中
            document.getElementById('loadingOverlay').style.display = 'flex';

            for (let i = 0; i < lines.length; i++) {
                let trans = await fetchTranslation(lines[i]);
                wordsData.push({
                    original: lines[i],
                    translation: trans,
                    firstTryResult: null // 記錄第一次是否答對
                });
            }

            // 隱藏載入中
            document.getElementById('loadingOverlay').style.display = 'none';

            loadCurrentWord();
            showPage('page2');
        }

        // 載入當前題目
        function loadCurrentWord() {
            let wordObj = wordsData[currentIndex];
            let wordStr = wordObj.original;
            
            currentMissingIndices = [];
            currentUserInputs = [];
            currentCorrectAnswers = [];

            if (currentMode === 'vowel') {
                const vowels = ['a', 'e', 'i', 'o', 'u', 'A', 'E', 'I', 'O', 'U'];
                for (let i = 0; i < wordStr.length; i++) {
                    if (vowels.includes(wordStr[i])) {
                        currentMissingIndices.push(i);
                        currentCorrectAnswers.push(wordStr[i].toLowerCase());
                    }
                }
            } else {
                // 隨機填空 1~3 個
                let numBlanks = Math.floor(Math.random() * 3) + 1;
                // 若單字太短，最多挖空長度的減一
                numBlanks = Math.min(numBlanks, wordStr.length);
                if (numBlanks === 0) numBlanks = 1;

                let indices = [];
                while (indices.length < numBlanks) {
                    let r = Math.floor(Math.random() * wordStr.length);
                    if (!indices.includes(r)) indices.push(r);
                }
                indices.sort((a, b) => a - b);
                currentMissingIndices = indices;
                indices.forEach(idx => currentCorrectAnswers.push(wordStr[idx].toLowerCase()));
            }

            document.getElementById('testTranslationDisplay').innerText = wordObj.translation;
            updateWordDisplay();
            generateCards();
        }

        // 更新單字顯示 (底線與使用者輸入結合)
        function updateWordDisplay() {
            let wordStr = wordsData[currentIndex].original;
            let displayHTML = '';
            let inputCounter = 0;

            for (let i = 0; i < wordStr.length; i++) {
                if (currentMissingIndices.includes(i)) {
                    if (inputCounter < currentUserInputs.length) {
                        displayHTML += currentUserInputs[inputCounter] + ' ';
                    } else {
                        displayHTML += '_ ';
                    }
                    inputCounter++;
                } else {
                    displayHTML += wordStr[i] + ' ';
                }
            }
            document.getElementById('testWordDisplay').innerText = displayHTML.trim();
        }

        // 產生 8 張字卡 (包含正確解答 + 隨機字母)
        function generateCards() {
            let pool = [...currentCorrectAnswers];
            const alphabet = "abcdefghijklmnopqrstuvwxyz";
            
            // 補足到 8 張
            while (pool.length < 8) {
                let r = alphabet[Math.floor(Math.random() * alphabet.length)];
                pool.push(r);
            }
            // 截斷避免超過 8 張 (極端情況單字挖超過8個洞)
            pool = pool.slice(0, 8);

            // 打亂陣列
            pool.sort(() => Math.random() - 0.5);

            let container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            pool.forEach(char => {
                let btn = document.createElement('div');
                btn.className = 'char-card';
                btn.innerText = char;
                btn.onclick = () => handleCardClick(char);
                container.appendChild(btn);
            });
        }

        // 點擊字卡填入字母
        function handleCardClick(char) {
            if (currentUserInputs.length < currentMissingIndices.length) {
                currentUserInputs.push(char);
                updateWordDisplay();
            }
        }

        // 清除按鈕
        function clearLastInput() {
            if (currentUserInputs.length > 0) {
                currentUserInputs.pop();
                updateWordDisplay();
            }
        }

        // 作答按鈕
        function checkAnswer() {
            if (currentUserInputs.length < currentMissingIndices.length) {
                alert("請填滿所有空缺！");
                return;
            }

            let isCorrect = true;
            for (let i = 0; i < currentCorrectAnswers.length; i++) {
                if (currentUserInputs[i].toLowerCase() !== currentCorrectAnswers[i].toLowerCase()) {
                    isCorrect = false;
                    break;
                }
            }

            let wordObj = wordsData[currentIndex];
            if (wordObj.firstTryResult === null) {
                wordObj.firstTryResult = isCorrect;
            }

            if (isCorrect) {
                showModal("恭喜答對！", currentIndex === test_words_total_num - 1 ? "全部結束" : "下一題", "correct");
            } else {
                showModal("不對喔～再想想", "重新作答", "wrong");
            }
        }

        // 顯示彈出視窗
        function showModal(msg, btnText, type) {
            document.getElementById('modalMsg').innerText = msg;
            let btn = document.getElementById('modalBtn');
            btn.innerText = btnText;
            btn.className = `modal-btn ${type === 'correct' ? 'btn-correct' : 'btn-wrong'}`;
            
            if (type === 'correct') {
                modalActionType = (btnText === "全部結束") ? 'finish' : 'next';
            } else {
                modalActionType = 'retry';
            }
            
            document.getElementById('modal').style.display = 'flex';
        }

        // 處理彈出視窗按鈕點擊
        function handleModalAction() {
            document.getElementById('modal').style.display = 'none';
            if (modalActionType === 'next') {
                currentIndex++;
                loadCurrentWord();
            } else if (modalActionType === 'finish') {
                generateResultPage();
                showPage('page3');
            } else if (modalActionType === 'retry') {
                currentUserInputs = [];
                updateWordDisplay();
            }
        }

        // 播放發音
        function playAudio() {
            let wordStr = wordsData[currentIndex].original;
            let utterance = new SpeechSynthesisUtterance(wordStr);
            utterance.lang = 'en-US';
            speechSynthesis.speak(utterance);
        }

        // 產生結果頁
        function generateResultPage() {
            let tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            for (let i = 0; i < test_words_total_num; i++) {
                let obj = wordsData[i];
                let tr = document.createElement('tr');
                let resultMark = obj.firstTryResult ? 'O' : 'X';
                let color = obj.firstTryResult ? 'green' : 'red';
                
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td style="color: ${color}; font-weight: bold;">${resultMark}</td>
                    <td>${obj.original}</td>
                    <td>${obj.translation}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 回到首頁
        function goHome() {
            document.getElementById('wordInput').value = '';
            showPage('page1');
        }
    </script>
</body>
</html>
